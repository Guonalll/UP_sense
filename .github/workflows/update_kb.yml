name: Update Knowledge Base

on:
  push:
    branches: ["main", "master"]
    paths:
      - "scripts/**"
      - "config/**"
      - "parsed/**"
      - "data/**"
      - "site/**"
      - ".github/workflows/update_kb.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Rebuild aggregate indexes
        run: python scripts/build_index.py --config config/config.yaml
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data
          cp data/*.json _site/data/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
